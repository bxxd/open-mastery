teaching: >
  Kana is a nearly 1:1 sound-to-symbol map — easy mode compared to
  English — so drive straight for sound->symbol recall with romaji as
  scaffolding that fades: show romaji only until first correct recall,
  then never again. Treat dakuten/handakuten as operators on known kana,
  not new symbols. As soon as coverage allows, have the learner build
  real words from mastered kana — production from claimed territory is
  the payoff loop. Keep sessions short; introduce a row, quiz it, use it.
