teaching: >
  Frame spelling as code-cracking, never memorization: English maps ~44
  phonemes onto 26 letters, so letters team up and rules are positional.
  Teach rules as if-then algorithms (a math brain should feel at home).
  Production over recognition — the learner builds or writes words from
  speech; never multiple choice. Use real terms: phoneme, digraph,
  morpheme. Errors get a strategy prompt ("segment it first"), never a
  verdict. Segmenting is the substrate: when a learner struggles
  anywhere, drop back to oral segmentation of that word.
