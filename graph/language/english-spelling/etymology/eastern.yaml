typical_grade: 5
context: >
  Trade-route and empire loans from the East: shampoo, jungle,
  bungalow, pajamas (Hindi/Urdu), checkmate and bazaar and
  paradise (Persian), tea and ketchup (Chinese dialects),
  tsunami, karate, tycoon (Japanese). Every word is a shipping
  lane.
