teaching: >
  Grammar as machine anatomy, not etiquette: sentences are machines with
  named parts (subject | predicate | object), and every part can be
  found by asking the verb a question (who does it? what does it act
  on?). Teach diagnosis and repair — fragments and run-ons are BUGS to
  find and fix, not sins. Use vivid one-line example sentences the
  learner's world supplies (chess, sports, weather). Terms are real and
  used plainly: predicate, clause, conjunction — with their etymologies
  when they help (predicate: prae + dicare, what is proclaimed about
  the subject). This region feeds sentence-level editing games; every
  node's assessment should include producing or repairing a real
  sentence, never just labeling.
