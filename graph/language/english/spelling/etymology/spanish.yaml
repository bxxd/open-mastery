bloom: understand
assess:
  - classify
  - locate
typical_grade: 4
context: >
  The Spanish layer maps the American West: canyon (cañón),
  rodeo, ranch, mosquito ('little fly'), tornado, patio,
  vanilla. Spanish also carried Nahuatl words north — chocolate
  and tomato are Aztec words wearing Spanish passports. Two-hop
  immigration.
