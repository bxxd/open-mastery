id: dec.conv.fraction_decimal
prereqs:
  - ns.pv.decimals_to_thousandths
  - frac.con.as_division
bloom: apply
assess:
  - convert
  - compare
  - solve
typical_grade: 5
context: >
  Convert between fractions and decimals. Divide numerator by
  denominator. Common equivalents: 1/2 = 0.5, 1/4 = 0.25,
  1/5 = 0.2, 3/4 = 0.75. Compare a fraction and a decimal
  by converting to same form. Some fractions produce repeating
  decimals (1/3 = 0.333...).
