id: frac.md.divide
prereqs:
  - frac.md.multiply
bloom: apply
assess:
  - solve
  - word_problem
  - explain
typical_grade: 5
context: >
  Divide unit fractions by whole numbers and whole numbers by
  unit fractions. "How many 1/3s are in 4?" = 4 / (1/3) = 12.
  Visual models essential. Invert-and-multiply as shortcut AFTER
  understanding why it works.
