id: frac.mx.conversion
prereqs:
  - frac.as.like_add
  - frac.eq.equivalent
bloom: apply
assess:
  - convert
  - solve
  - word_problem
typical_grade: 4
context: >
  Convert between improper fractions and mixed numbers.
  7/4 = 1 3/4. Add and subtract mixed numbers with like
  denominators. Regrouping with mixed numbers (borrowing
  a whole to create fractions).
