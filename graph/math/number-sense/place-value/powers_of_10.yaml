id: ns.pv.powers_of_10
prereqs:
  - ops.mul.by_10_100_1000
  - ns.pv.decimals_to_thousandths
bloom: understand
assess:
  - solve
  - explain_pattern
  - convert
typical_grade: 5
context: >
  Powers of 10 unify multiplication and division by 10, 100, 1000.
  10^1 = 10, 10^2 = 100, 10^3 = 1000. Multiplying shifts decimal
  right; dividing shifts left. Exponent notation as shorthand.
