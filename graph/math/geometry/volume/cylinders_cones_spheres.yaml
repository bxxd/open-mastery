id: geo.vol.cylinders_cones_spheres
prereqs:
  - geo.vol.rectangular_prism
  - geo.ap.circles_intro
bloom: apply
assess:
  - solve
  - word_problem
  - explain
typical_grade: 8
context: >
  Cylinder: V = pi*r^2*h (circular base x height). Cone: V =
  (1/3)*pi*r^2*h (one-third of cylinder). Sphere: V = (4/3)*pi*r^3.
  The 1/3 relationship: a cone is 1/3 of its containing cylinder.
  Real-world: cans, ice cream cones, basketballs. Compare volumes.
