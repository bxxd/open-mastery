<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>skill tree</title>
<style>
  * { margin: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0b1120; color: #e2e8f0; font-family: system-ui, sans-serif; user-select: none; }
  /* host bar (when ?home= present) — matches the learn shell chrome */
  #bar {
    position: sticky; top: 0; z-index: 5; height: 44px; display: none; align-items: center;
    gap: 0.5rem; padding: 0 0.75rem; background: #0f172a; color: #94a3b8;
    border-bottom: 1px solid #1e293b;
  }
  #bar a { color: #e2e8f0; text-decoration: none; font-weight: 800; font-size: 0.95rem;
    padding: 0.3rem 0.6rem; border-radius: 0.5rem; }
  #bar a:active { background: #1e293b; }
  #bar .crumbs { flex: 1; font-size: 0.9rem; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  #bar .stats { color: #64748b; font-size: 0.85rem; font-weight: 700; }
  /* standalone fallback header */
  #fallback { padding: 1rem 1.2rem 0.4rem; display: none; align-items: baseline; gap: 0.8rem; }
  #fallback h1 { font-size: 1.4rem; letter-spacing: -0.01em; }
  #fallback .stats { color: #64748b; font-size: 0.9rem; font-weight: 600; }
  #fallback button { border: 0; background: #172033; color: #94a3b8; border-radius: 0.6rem;
    padding: 0.3rem 0.7rem; font-weight: 800; font-size: 0.9rem; font-family: inherit; }
  /* one section per region — read top to bottom; no edge spaghetti */
  #secs { padding: 0.6rem 1rem 6rem; max-width: 40rem; margin: 0 auto; }
  .sec { margin-top: 1.1rem; }
  .sec h2 { display: flex; align-items: baseline; gap: 0.6rem; color: #64748b;
    font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; }
  .sec h2 .ct { color: #475569; font-size: 0.75rem; font-weight: 700; }
  .sec h2 .ct.done { color: #10b981; }
  .row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.55rem; }
  .node {
    border: 0; border-radius: 0.7rem; padding: 0.45rem 0.7rem; font-weight: 700;
    font-size: 0.85rem; font-family: inherit;
  }
  .owned { background: #10b981; color: #052e16; }
  .frontier { background: #f1f5f9; color: #0f172a; box-shadow: 0 0 12px 2px rgba(241,245,249,0.25); }
  .locked { background: #172033; color: #475569; }
  .node:active { transform: scale(0.95); }
  #sheet {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: min(92vw, 26rem); background: #111a2e; z-index: 10; border-radius: 1.2rem;
    padding: 1.1rem 1.3rem 1.4rem; display: none;
    box-shadow: 0 24px 70px rgba(0,0,0,0.6); max-height: 82dvh; overflow-y: auto;
  }
  #sheet .x { position: absolute; top: 0.7rem; right: 0.9rem; border: 0; background: #172033;
    color: #94a3b8; font-weight: 900; font-size: 1rem; width: 2rem; height: 2rem;
    border-radius: 50%; font-family: inherit; }
  #sheet h2 { font-size: 1.15rem; margin-bottom: 0.2rem; }
  #sheet .region { color: #64748b; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  #sheet p { color: #94a3b8; line-height: 1.45; margin-top: 0.5rem; font-size: 0.92rem; }
  #sheet .pre { margin-top: 0.6rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
  #sheet .pre span { font-size: 0.78rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 999px; }
  /* back into the game — names the destination, always visible */
  #go {
    position: fixed; right: 0.9rem; bottom: calc(0.9rem + env(safe-area-inset-bottom));
    z-index: 5; background: #10b981; color: #052e16; text-decoration: none;
    font-weight: 800; font-size: 1.05rem; padding: 0.75rem 1.3rem; border-radius: 1.1rem;
    box-shadow: 0 8px 24px rgba(16,185,129,0.4);
  }
</style>
</head>
<body>
<div id="bar"></div>
<header id="fallback"><button onclick="history.back()">‹</button><h1></h1><span class="stats"></span></header>
<div id="secs"></div>
<div id="sheet"></div>
<script>
// Generic skill-tree viewer for an open-mastery graph export.
//   ?graph=<url of export json>   required
//   ?progress=<localStorage key>  optional — MasteryState {stats:{id:{streak}}}
//   ?title=<name>
//   ?play=<url template with {id}>  optional — owned/frontier nodes get a
//         "practice" link (the learner picks from the frontier; locked stays locked)
//   ?home=<url>  optional — render the host shell bar (⌂ + crumbs + stats)
//         instead of the standalone header
//   ?map=<url>   optional — bar link back to the host's world map
// Layout: one section per region, regions ordered by their shallowest node,
// nodes within a region in depth order. Dependencies live in the tap-sheet
// (prereq chips), not as drawn edges — flat sections are the point: readable,
// scannable, navigable. Owned: streak >= 3 on the node id, or on every
// `members` entry. Frontier: all prereqs owned. Tap a node for its story.
const q = new URLSearchParams(location.search)
const STREAK = 3
async function main() {
  const graph = await (await fetch(q.get('graph'))).json()
  const title = q.get('title') || 'skill tree'
  let stats = {}
  try { stats = JSON.parse(localStorage.getItem(q.get('progress')))?.stats ?? {} } catch {}
  const ownedId = (id) => (stats[id]?.streak ?? 0) >= STREAK
  const nodes = graph.nodes
  const byId = Object.fromEntries(nodes.map((n) => [n.id, n]))
  const owned = new Set(nodes.filter((n) =>
    ownedId(n.id) || (n.members && n.members.every(ownedId))).map((n) => n.id))
  const frontier = new Set(nodes.filter((n) =>
    !owned.has(n.id) && n.prereqs.every((p) => owned.has(p))).map((n) => n.id))
  const statsText = `${owned.size} owned · ${frontier.size} open · ${nodes.length} total`

  const home = q.get('home')
  const play = q.get('play')
  const gameBase = play ? play.split('?')[0] : null
  if (home) {
    const bar = document.getElementById('bar')
    bar.style.display = 'flex'
    bar.innerHTML = `<a href="${home}">⌂ learn</a>
      <span class="crumbs">${gameBase ? `<a href="${gameBase}">${title}</a>` : title} › levels</span>
      <span class="stats">${statsText}</span>
      ${q.get('map') ? `<a href="${q.get('map')}">map</a>` : ''}`
  } else {
    const f = document.getElementById('fallback')
    f.style.display = 'flex'
    f.querySelector('h1').textContent = title
    f.querySelector('.stats').textContent = statsText
  }

  // depth = longest prereq chain; regions ordered by their shallowest node
  const memo = {}
  const depth = (id) => memo[id] ??
    (memo[id] = 1 + Math.max(0, ...(byId[id]?.prereqs ?? []).map(depth)))
  for (const n of nodes) depth(n.id)
  const minDepth = {}
  for (const n of nodes) {
    const r = n.region
    minDepth[r] = Math.min(minDepth[r] ?? Infinity, memo[n.id])
  }
  const regions = [...new Set(nodes.map((n) => n.region))]
    .sort((a, b) => minDepth[a] - minDepth[b] || a.localeCompare(b))

  const secs = document.getElementById('secs')
  for (const r of regions) {
    const ns = nodes.filter((n) => n.region === r)
      .sort((a, b) => memo[a.id] - memo[b.id] || a.id.localeCompare(b.id))
    const own = ns.filter((n) => owned.has(n.id)).length
    const sec = document.createElement('section')
    sec.className = 'sec'
    sec.innerHTML = `<h2>${r || 'core'} <span class="ct ${own === ns.length ? 'done' : ''}">${own} / ${ns.length}</span></h2>`
    const row = document.createElement('div')
    row.className = 'row'
    for (const n of ns) {
      const b = document.createElement('button')
      const st = owned.has(n.id) ? 'owned' : frontier.has(n.id) ? 'frontier' : 'locked'
      b.className = `node ${st}`
      b.textContent = n.name
      b.onclick = () => sheet(n, st)
      row.appendChild(b)
    }
    sec.appendChild(row)
    secs.appendChild(sec)
  }

  // the way back in: play the shallowest open node
  if (play) {
    const cand = nodes.filter((n) => frontier.has(n.id))
      .sort((a, b) => memo[a.id] - memo[b.id] || a.id.localeCompare(b.id))[0]
    if (cand) {
      const go = document.createElement('a')
      go.id = 'go'
      go.href = play.replace('{id}', encodeURIComponent(cand.id))
      go.textContent = `play ▸ ${cand.name}`
      document.body.appendChild(go)
    }
  }

  function sheet(n, st) {
    const s = document.getElementById('sheet')
    const pres = n.prereqs.map((p) => {
      const cls = owned.has(p) ? 'owned' : 'locked'
      const name = byId[p]?.name ?? p
      return `<span class="${cls}">${name}</span>`
    }).join('')
    const play = q.get('play')
    const canPlay = play && st !== 'locked'
    s.innerHTML = `<button class="x" aria-label="close" onclick="this.parentNode.style.display='none'">✕</button>
      <div class="region">${n.region || ''} — ${st}</div>
      <h2>${n.name}</h2>
      ${canPlay ? `<a href="${play.replace('{id}', encodeURIComponent(n.id))}"
        style="display:inline-block;margin-top:0.4rem;background:#10b981;color:#052e16;font-weight:800;
        padding:0.55rem 1.2rem;border-radius:0.8rem;text-decoration:none">practice ▸</a>` : ''}
      <p>${n.context}</p>
      ${n.prereqs.length ? `<div class="pre">${pres}</div>` : ''}`
    s.style.display = 'block'
  }
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#sheet') && !e.target.closest('.node'))
      document.getElementById('sheet').style.display = 'none'
  })
}
main()
</script>
</body>
</html>
